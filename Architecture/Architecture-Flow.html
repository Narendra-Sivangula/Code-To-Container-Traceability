
<style>
@keyframes fadeInDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeInUp   { from { opacity:0; transform:translateY(8px);  } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }
@keyframes dot-travel { 0%{stroke-dashoffset:200;opacity:1;} 80%{opacity:1;} 100%{stroke-dashoffset:0;opacity:0;} }
@keyframes glow-in { from{opacity:0;r:4;} to{opacity:1;r:7;} }
@keyframes badge-pop { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }

.node-box { transition: filter 0.3s; }
.node-box.active { filter: drop-shadow(0 0 6px #7F77DD); }
.node-box.done   { opacity: 1; }
.node-box.dim    { opacity: 0.28; }

.flow-dot {
  stroke-dasharray: 8 200;
  stroke-dashoffset: 200;
  stroke-linecap: round;
  fill: none;
  opacity: 0;
}
.flow-dot.go {
  animation: dot-travel 1.1s ease-in forwards;
}

.step-label {
  font-size: 12px;
  font-family: var(--font-sans, sans-serif);
  fill: var(--color-text-secondary, #888);
}
.node-title {
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans, sans-serif);
}
.node-sub {
  font-size: 11px;
  font-family: var(--font-sans, sans-serif);
}

.progress-pip {
  transition: fill 0.3s, r 0.3s;
}

.info-card {
  transition: opacity 0.4s;
}
</style>

<!-- Controls -->
<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0 4px;font-size:13px;color:var(--color-text-secondary);">
  <button id="btn-play" onclick="startAnimation()" style="padding:6px 20px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px;">Play</button>
  <button id="btn-reset" onclick="resetAnimation()" style="padding:6px 20px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px;">Reset</button>
  <span id="step-counter" style="min-width:80px;text-align:center;">Step 0 / 10</span>
</div>

<script>
const STEPS = [
  { nodes:[0],      dots:['d0'],          pip:0,  info:'Developer pushes code to GitHub' },
  { nodes:[1],      dots:['d1'],          pip:1,  info:'Webhook triggers Jenkins build' },
  { nodes:[2,3],    dots:['d2','d3'],     pip:2,  info:'Jenkins builds image → registry + indexes build metadata' },
  { nodes:[4],      dots:['d4'],          pip:3,  info:'ci-build-metadata stored in OpenSearch' },
  { nodes:[5],      dots:['d5','d6'],     pip:4,  info:'ArgoCD syncs → deploys app pod + deployment-trace Job' },
  { nodes:[6,7],    dots:[],              pip:5,  info:'App pod running, deployment-trace Job starts' },
  { nodes:[8],      dots:['d7'],          pip:6,  info:'deployment-trace collects pod status → sends to OpenSearch' },
  { nodes:[9],      dots:['d8'],          pip:7,  info:'traceability-aggregator collects all pods + metrics' },
  { nodes:[10],     dots:['d9','d9b','d9c'], pip:8, info:'All 3 indexes feed into Grafana dashboards' },
  { nodes:[11,12],  dots:['d10'],         pip:9,  info:'Engineer sees end-to-end traceability in Grafana' },
];

const allNodeIds = ['n0','n1','n2','n3','n4','n5','n6','n7','n8','n9','n10','n11','n12'];
const pipColors  = ['#378ADD','#7F77DD','#7F77DD','#1D9E75','#7F77DD','#378ADD','#D85A30','#1D9E75','#639922','#639922'];
let currentStep = -1;
let timer = null;
let running = false;

function setInfo(text) {
  const bg = document.getElementById('info-bg');
  const t  = document.getElementById('info-text');
  const w  = Math.min(text.length * 7 + 24, 640);
  bg.setAttribute('width', w);
  bg.setAttribute('x', (680 - w) / 2);
  t.setAttribute('x', 340);
  t.textContent = text;
  bg.setAttribute('opacity', '1');
  t.setAttribute('opacity', '1');
}

function fireDoc(dotId) {
  const el = document.getElementById(dotId);
  if (!el) return;
  el.classList.remove('go');
  void el.offsetWidth;
  el.classList.add('go');
}

function activateNodes(nodeNums) {
  allNodeIds.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    el.classList.add('dim');
  });
  nodeNums.forEach(n => {
    const el = document.getElementById('n' + n);
    el.classList.remove('dim');
    el.classList.add('active');
  });
  for (let i = 0; i < currentStep; i++) {
    STEPS[i].nodes.forEach(n => {
      const el = document.getElementById('n' + n);
      el.classList.remove('dim','active');
      el.classList.add('done');
    });
  }
}

function setPips(upTo, color) {
  for (let i = 0; i <= 9; i++) {
    const pip = document.getElementById('pip' + i);
    if (i < upTo)      { pip.setAttribute('fill', '#C2C0B6'); pip.setAttribute('r','4'); }
    else if (i === upTo){ pip.setAttribute('fill', color);     pip.setAttribute('r','6'); }
    else                { pip.setAttribute('fill', '#C2C0B6'); pip.setAttribute('r','4'); }
  }
}

function runStep(idx) {
  if (idx >= STEPS.length) {
    running = false;
    document.getElementById('btn-play').textContent = 'Play';
    document.getElementById('step-counter').textContent = 'Done!';
    allNodeIds.forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('dim','active');
      el.classList.add('done');
    });
    return;
  }
  currentStep = idx;
  const step = STEPS[idx];
  document.getElementById('step-counter').textContent = 'Step ' + (idx+1) + ' / ' + STEPS.length;
  activateNodes(step.nodes);
  step.dots.forEach(d => fireDoc(d));
  setPips(step.pip, pipColors[step.pip]);
  setInfo(step.info);
  timer = setTimeout(() => runStep(idx + 1), 1800);
}

function startAnimation() {
  if (running) return;
  running = true;
  document.getElementById('btn-play').textContent = 'Playing…';
  resetNodes();
  currentStep = -1;
  runStep(0);
}

function resetNodes() {
  allNodeIds.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    el.classList.add('dim');
  });
  ['d0','d1','d2','d3','d4','d5','d6','d7','d8','d9','d9b','d9c','d10'].forEach(d => {
    const el = document.getElementById(d);
    if (el) el.classList.remove('go');
  });
  for (let i=0;i<=9;i++) {
    document.getElementById('pip'+i).setAttribute('fill','#C2C0B6');
    document.getElementById('pip'+i).setAttribute('r','4');
  }
  document.getElementById('info-bg').setAttribute('opacity','0');
  document.getElementById('info-text').setAttribute('opacity','0');
}

function resetAnimation() {
  clearTimeout(timer);
  running = false;
  currentStep = -1;
  resetNodes();
  document.getElementById('btn-play').textContent = 'Play';
  document.getElementById('step-counter').textContent = 'Step 0 / 10';
}
</script>
